name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Security scan
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install security tools
        run: pip install bandit pip-audit
      - name: Run bandit
        run: bandit -r src/ -ll
      - name: Run pip-audit
        run: pip-audit

  # Tests
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.9', '3.11', '3.13']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Smoke test matcher
        run: |
          mkdir -p ~/.config/lk-autocorrect
          printf "git\ndocker\nkubectl\nterraform\n" > ~/.config/lk-autocorrect/commands.txt
          result=$(python3 src/matcher.py "gti" ~/.config/lk-autocorrect/commands.txt 3)
          [ "$result" = "git|||1" ] && echo "PASS: gti->git" || (echo "FAIL" && exit 1)
          result=$(python3 src/matcher.py "dockr" ~/.config/lk-autocorrect/commands.txt 3)
          [ "$result" = "docker|||1" ] && echo "PASS: dockr->docker" || (echo "FAIL" && exit 1)

      - name: Test injection blocking
        run: |
          result=$(python3 src/matcher.py "git;rm -rf" ~/.config/lk-autocorrect/commands.txt 3)
          [ -z "$result" ] && echo "PASS: injection blocked" || (echo "FAIL" && exit 1)

      - name: Test CLI entry point
        run: |
          pip install -e .
          lk-autocorrect --version
          lk-autocorrect status