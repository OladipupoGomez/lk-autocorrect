name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Security scan
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install security tools
        run: pip install --upgrade "setuptools>=83.0.0,<85" bandit pip-audit
      - name: Run bandit
        run: bandit -r src/ -ll
      - name: Run pip-audit
        run: pip-audit

  # Tests
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12', '3.13']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Smoke test matcher (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p ~/.config/lk-autocorrect
          printf "git\ndocker\nkubectl\nterraform\n" > ~/.config/lk-autocorrect/commands.txt
          result=$(python3 src/matcher.py "gti" ~/.config/lk-autocorrect/commands.txt 2)
          [ "$result" = "git|||1" ] && echo "PASS: gti->git" || (echo "FAIL" && exit 1)
          result=$(python3 src/matcher.py "dockr" ~/.config/lk-autocorrect/commands.txt 2)
          [ "$result" = "docker|||1" ] && echo "PASS: dockr->docker" || (echo "FAIL" && exit 1)

      - name: Smoke test matcher (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dir = "$env:USERPROFILE\.config\lk-autocorrect"
          New-Item -ItemType Directory -Force -Path $dir
          "git`ndocker`nkubectl`nterraform" | Set-Content "$dir\commands.txt"
          $result = python src/matcher.py "gti" "$dir\commands.txt" 2
          if ($result -eq "git|||1") { Write-Host "PASS: gti->git" } else { Write-Error "FAIL" }
          $result = python src/matcher.py "dockr" "$dir\commands.txt" 2
          if ($result -eq "docker|||1") { Write-Host "PASS: dockr->docker" } else { Write-Error "FAIL" }

      - name: Test injection blocking (unix)
        if: runner.os != 'Windows'
        run: |
          result=$(python3 src/matcher.py "git;rm -rf" ~/.config/lk-autocorrect/commands.txt 2)
          [ -z "$result" ] && echo "PASS: injection blocked" || (echo "FAIL" && exit 1)

      - name: Test injection blocking (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dir = "$env:USERPROFILE\.config\lk-autocorrect"
          $result = python src/matcher.py "git;rm -rf" "$dir\commands.txt" 2
          if (-not $result) { Write-Host "PASS: injection blocked" } else { Write-Error "FAIL: injection not blocked" }

      - name: Test CLI entry point
        run: |
          pip install -e .
          lk-autocorrect --version

      - name: Test CLI status command
        run: |
          lk-autocorrect status

      - name: Test CLI upgrade dispatch (dry check)
        run: |
          lk-autocorrect help