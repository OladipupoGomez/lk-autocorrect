name: Publish to PyPI

on:
  push:
    tags: ['v*']

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install security tools
        run: pip install bandit pip-audit
      - name: Run bandit (static security analysis)
        run: bandit -r src/ -ll
      - name: Run pip-audit (dependency vulnerabilities)
        run: pip-audit

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12','3.13']
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Smoke test matcher
        run: |
          mkdir -p ~/.config/lk-autocorrect
          echo -e "git\ndocker\nkubectl\nterraform" > ~/.config/lk-autocorrect/commands.txt
          result=$(python3 src/matcher.py "gti" ~/.config/lk-autocorrect/commands.txt 3)
          [[ "$result" == "git|||1" ]] && echo "PASS: gti->git" || (echo "FAIL" && exit 1)
          result=$(python3 src/matcher.py "dockr" ~/.config/lk-autocorrect/commands.txt 3)
          [[ "$result" == "docker|||1" ]] && echo "PASS: dockr->docker" || (echo "FAIL" && exit 1)
          result=$(python3 src/matcher.py "terrafrom" ~/.config/lk-autocorrect/commands.txt 3)
          [[ "$result" == "terraform|||1" ]] && echo "PASS: terrafrom->terraform" || (echo "FAIL" && exit 1)
      - name: Test injection blocking
        run: |
          mkdir -p ~/.config/lk-autocorrect
          echo "git" > ~/.config/lk-autocorrect/commands.txt
          result=$(python3 src/matcher.py "git;rm -rf" ~/.config/lk-autocorrect/commands.txt 3)
          [[ -z "$result" ]] && echo "PASS: injection blocked" || (echo "FAIL: injection not blocked" && exit 1)
      - name: Test CLI entry point
        run: |
          pip install -e .
          lk-autocorrect --version
          lk-autocorrect status

  # Publish
  publish:
    needs: [security, test]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build
        run: |
          pip install build
          python -m build
      - name: Publish to PyPI (trusted publishing — no token needed)
        uses: pypa/gh-action-pypi-publish@release/v1
